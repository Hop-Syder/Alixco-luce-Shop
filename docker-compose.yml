version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: iroko_mobilier_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: iroko_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
